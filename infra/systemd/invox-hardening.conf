[Service]
# InvoxAI interim sandboxing (services still run as root pending /opt relocation).
# Node-safe set: NO MemoryDenyWriteExecute (breaks V8 JIT), NO ProtectHome (app
# lives under /root). Revert by deleting this drop-in + daemon-reload.
NoNewPrivileges=true
PrivateTmp=true
ProtectSystem=full
ProtectKernelTunables=true
ProtectKernelModules=true
ProtectKernelLogs=true
ProtectControlGroups=true
ProtectClock=true
ProtectHostname=true
RestrictSUIDSGID=true
RestrictRealtime=true
RestrictNamespaces=true
LockPersonality=true
SystemCallArchitectures=native
