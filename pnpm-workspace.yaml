packages:
  - "apps/*"
  - "packages/*"
# Allow these dependencies to run install scripts (pnpm 11 blocks them by default).
# Prisma must fetch its query engine; sharp builds Next.js image optimization.
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  # source-map upload CLI only; not needed for our env-gated server init.
  "@sentry/cli": false
  esbuild: true
  # BullMQ's optional native msgpack accelerator; it falls back to pure JS, so
  # we don't build it.
  msgpackr-extract: false
  prisma: true
  sharp: true
