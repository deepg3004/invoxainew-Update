# /etc/nginx/conf.d/00-zones.conf
#
# Shared limit_req_zone declarations referenced by every vhost in the
# main invoxai.conf. Drop this in /etc/nginx/conf.d/ — files there get
# picked up at the http{} scope automatically.

# /api/checkout/* — strict, 10 req/s per IP.
limit_req_zone $binary_remote_addr zone=checkout_rl:10m rate=10r/s;

# Everything else under /api/ — 30 req/s per IP.
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=30r/s;
