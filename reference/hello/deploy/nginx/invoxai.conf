# =============================================================================
# /etc/nginx/sites-available/invoxai
#
# Two server blocks share the same Next.js upstream on 127.0.0.1:3000:
#   - hello.invoxai.io        (app root — direct SAN cert from certbot --nginx)
#   - *.invoxai.io            (wildcard, served from the DNS-01 cert)
#   - any custom hostname     (cert dropped in by cert-manager / CF for SaaS)
#
# Rate limits are configured at http {} scope and referenced per location.
# Drop this entire file into sites-available/invoxai, link it into
# sites-enabled, then `nginx -t && systemctl reload nginx`.
# =============================================================================

# ── Shared rate-limit zones (configure http{} scope) ───────────────────────
#   /api/checkout/*  → 10 req/s, burst 30
#   /api/*           → 30 req/s, burst 60
# These directives must live in /etc/nginx/conf.d/00-zones.conf or the http
# block of /etc/nginx/nginx.conf — they're ignored inside server{} scope.
#
# Add this to /etc/nginx/conf.d/00-zones.conf:
#   limit_req_zone $binary_remote_addr zone=checkout_rl:10m rate=10r/s;
#   limit_req_zone $binary_remote_addr zone=api_rl:10m      rate=30r/s;

upstream invoxai_next {
  server 127.0.0.1:3000 fail_timeout=0;
  keepalive 32;
}

# ── HTTP → HTTPS redirect (covers the apex + wildcard) ─────────────────────
server {
  listen      80;
  listen      [::]:80;
  server_name hello.invoxai.io invoxai.io *.invoxai.io;

  # Allow Let's Encrypt http-01 challenges through plain HTTP.
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ── Main HTTPS vhost ───────────────────────────────────────────────────────
server {
  listen      443 ssl http2;
  listen      [::]:443 ssl http2;
  server_name hello.invoxai.io;

  ssl_certificate     /etc/letsencrypt/live/hello.invoxai.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/hello.invoxai.io/privkey.pem;
  include             /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

  # ── Security headers (HSTS / clickjacking / sniffing / referrer) ────────
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options           "SAMEORIGIN" always;
  add_header X-Content-Type-Options    "nosniff" always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
  # Don't leak the upstream
  proxy_hide_header X-Powered-By;

  # ── Sizing / timeouts ──────────────────────────────────────────────────
  client_max_body_size      10m;
  client_body_buffer_size   16k;
  proxy_connect_timeout     5s;
  proxy_send_timeout        60s;
  proxy_read_timeout        60s;

  # ── Compression ─────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_min_length   1024;
  gzip_comp_level   5;
  gzip_types
    application/atom+xml application/javascript application/json
    application/manifest+json application/rss+xml application/wasm
    application/x-font-ttf application/x-web-app-manifest+json
    application/xhtml+xml application/xml font/opentype image/svg+xml
    image/x-icon text/css text/plain text/x-component;

  # ── /_next/static — long-lived immutable cache ─────────────────────────
  location /_next/static/ {
    proxy_pass http://invoxai_next;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_http_version 1.1;
    proxy_cache_bypass $http_upgrade;

    expires           365d;
    access_log        off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # ── Static public files served by Next ────────────────────────────────
  location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml)$ {
    proxy_pass http://invoxai_next;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 7d;
    access_log off;
  }

  # ── /api/checkout — strict rate limit (10 r/s, burst 30) ───────────────
  location /api/checkout/ {
    limit_req zone=checkout_rl burst=30 nodelay;
    limit_req_status 429;
    proxy_pass http://invoxai_next;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_http_version 1.1;
    proxy_set_header Connection        "";
  }

  # ── /api/* — general API limit (30 r/s, burst 60) ──────────────────────
  location /api/ {
    limit_req zone=api_rl burst=60 nodelay;
    limit_req_status 429;
    proxy_pass http://invoxai_next;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_http_version 1.1;
    proxy_set_header Connection        "";
  }

  # ── Everything else (page render, websocket upgrade for future RT) ────
  location / {
    proxy_pass http://invoxai_next;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_cache_bypass                 $http_upgrade;
  }
}

# ── *.invoxai.io wildcard vhost ────────────────────────────────────────────
# Subdomain seller URLs route through the same upstream — middleware reads
# the Host header to figure out which seller's pages to render.
server {
  listen      443 ssl http2;
  listen      [::]:443 ssl http2;
  server_name *.invoxai.io;

  ssl_certificate     /etc/letsencrypt/live/invoxai.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/invoxai.io/privkey.pem;
  include             /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options           "SAMEORIGIN" always;
  add_header X-Content-Type-Options    "nosniff" always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

  client_max_body_size 10m;
  gzip on;
  gzip_types application/json text/css application/javascript image/svg+xml;

  location /_next/static/ {
    proxy_pass http://invoxai_next;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    access_log off;
  }

  location /api/checkout/ {
    limit_req zone=checkout_rl burst=30 nodelay;
    proxy_pass http://invoxai_next;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
  }

  location /api/ {
    limit_req zone=api_rl burst=60 nodelay;
    proxy_pass http://invoxai_next;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
  }

  location / {
    proxy_pass http://invoxai_next;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
  }
}

# ── Default catch-all for unknown custom domains ──────────────────────────
# Real custom-domain vhosts are dropped in /etc/nginx/sites-enabled/ by
# cert-manager (or by the operator) — see docs/DEPLOY.md.
server {
  listen      443 ssl http2 default_server;
  listen      [::]:443 ssl http2 default_server;
  server_name _;
  ssl_certificate     /etc/letsencrypt/live/hello.invoxai.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/hello.invoxai.io/privkey.pem;
  return 444;  # close connection without a response
}
